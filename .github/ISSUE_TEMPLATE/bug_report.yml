name: Bug report
description: Report a reproducible TTMEvolve bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include exact commands or GUI actions.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: e.g. v0.4.5-source-checkpoint or commit hash
  - type: textarea
    id: evidence
    attributes:
      label: Runtime evidence
      description: Paste relevant `/health`, `/runtime/readiness`, or log excerpts. Do not include secrets.
